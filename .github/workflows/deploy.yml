name: Deploy to EC2

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # 手動実行を許可

jobs:
  test:
    runs-on: ubuntu-latest
    # srcディレクトリをworking-directoryに設定
    defaults:
      run:
        working-directory: src
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: mbstring, xml, ctype, json, bcmath

    - name: Install dependencies
      run: composer install --prefer-dist --no-progress

    # ユニットテストを実行（phpunit.xml により sqlite :memory: で動作）
    - name: Run tests
      run: |
        cp .env.example .env
        php artisan key:generate
        php artisan test

  deploy:
    needs: test  # testジョブが成功した場合のみ実行
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'  # main/masterブランチへのpushのみデプロイ

    steps:
    # AWS認証情報を設定
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    # Systems Managerを使用してEC2でデプロイスクリプトを実行
    - name: Deploy to EC2 via SSM
      id: deploy
      run: |
        # SSMでコマンド実行
        COMMAND_ID=$(aws ssm send-command \
          --instance-ids ${{ secrets.EC2_INSTANCE_ID }} \
          --document-name "AWS-RunShellScript" \
          --comment "Deploy from GitHub Actions" \
          --parameters 'commands=[
            "cd /home/ec2-user/csd-test",
            "sudo -u ec2-user bash /home/ec2-user/csd-test/deploy.sh"
          ]' \
          --output text \
          --query "Command.CommandId")

        echo "Command ID: $COMMAND_ID"
        echo "command_id=$COMMAND_ID" >> $GITHUB_OUTPUT

        # コマンド完了を待機(最大5分)
        echo "⏳ Waiting for deployment to complete..."
        aws ssm wait command-executed \
          --command-id "$COMMAND_ID" \
          --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
          --cli-read-timeout 300

        # コマンド結果を取得
        STATUS=$(aws ssm get-command-invocation \
          --command-id "$COMMAND_ID" \
          --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
          --query "Status" \
          --output text)

        OUTPUT=$(aws ssm get-command-invocation \
          --command-id "$COMMAND_ID" \
          --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
          --query "StandardOutputContent" \
          --output text)

        ERROR_OUTPUT=$(aws ssm get-command-invocation \
          --command-id "$COMMAND_ID" \
          --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
          --query "StandardErrorContent" \
          --output text)

        echo "📋 Deployment output:"
        echo "$OUTPUT"

        # デプロイ結果を確認
        if [ "$STATUS" != "Success" ]; then
          echo "❌ Deployment failed with status: $STATUS"
          echo "🔴 Error output:"
          echo "$ERROR_OUTPUT"
          exit 1
        fi

        echo "✅ Deployment completed successfully!"

    # デプロイステータスを通知
    - name: Notify deployment status
      if: always()
      run: |
        if [ ${{ job.status }} == 'success' ]; then
          echo "✅ Deployment succeeded!"
        else
          echo "❌ Deployment failed!"
        fi
